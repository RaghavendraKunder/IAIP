<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Exams — ExamFlow</title>
  <link rel="stylesheet" href="css/admin-style.css"/>
  <style>
    .welcome-banner {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      border-radius: calc(var(--radius) * 2);
      padding: 28px 32px;
      margin-bottom: 28px;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }
    .welcome-banner::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
    }
    .welcome-text h2 {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }
    .welcome-text p { font-size: 13px; opacity: 0.8; margin: 0; }
    .welcome-chips { display: flex; gap: 8px; flex-wrap: wrap; position: relative; z-index: 1; }
    .welcome-chip {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 600;
      font-family: var(--font-mono);
    }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }
    @media (max-width: 700px) { .stats-row { grid-template-columns: 1fr 1fr; } }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 2);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow-xs);
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .stat-card:hover { box-shadow: var(--shadow-md); border-color: #c7d2fe; }
    .stat-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    .stat-card h3 {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1;
    }
    .stat-card p { font-size: 12px; color: var(--muted-foreground); margin-top: 2px; font-weight: 600; }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-heading {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
    }
    .timeline { display: flex; flex-direction: column; gap: 14px; }
    .date-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--muted-foreground);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px 12px;
      margin-bottom: 10px;
      letter-spacing: 0.3px;
    }
    .exam-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 2);
      padding: 18px 22px;
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow-xs);
      transition: box-shadow 0.2s, border-color 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }
    .exam-row::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--primary);
      border-radius: 4px 0 0 4px;
    }
    .exam-row.expired::before  { background: var(--border); }
    .exam-row.attempted::before { background: var(--success); }
    .exam-row:hover:not(.expired):not(.attempted) {
      box-shadow: var(--shadow-md);
      border-color: #c7d2fe;
      transform: translateX(2px);
    }
    @media (max-width: 640px) { .exam-row { grid-template-columns: 1fr; } }
    .exam-num {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--primary-light);
      border: 2px solid #c7d2fe;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      color: var(--primary-dark);
      flex-shrink: 0;
    }
    .exam-row.attempted .exam-num { background: var(--success-light); border-color: #6ee7b7; color: #065f46; }
    .exam-row.expired   .exam-num { background: var(--surface); border-color: var(--border); color: var(--muted-foreground); }
    .exam-info { min-width: 0; }
    .exam-title {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .exam-meta-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 10px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted-foreground);
      font-weight: 500;
    }
    .deadline-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      border-radius: calc(var(--radius) * 1.5);
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .dl-ok      { background: var(--success-light); color: #065f46; border: 1px solid #6ee7b7; }
    .dl-warning { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
    .dl-expired { background: var(--destructive-light); color: #991b1b; border: 1px solid #fca5a5; }
    .dl-none    { background: var(--surface); color: var(--muted-foreground); border: 1px solid var(--border); }
    .btn-start {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 9px 18px;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.18s;
      box-shadow: var(--shadow-sm);
      white-space: nowrap;
    }
    .btn-start:hover { background: var(--primary-dark); box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .btn-done {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--success-light);
      color: #065f46;
      border: 1px solid #6ee7b7;
      border-radius: var(--radius);
      padding: 9px 18px;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }
    .btn-locked {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      color: var(--muted-foreground);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 18px;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: calc(var(--radius) * 2);
    }
    .empty-state h3 { font-family: var(--font-display); font-size: 16px; font-weight: 700; margin: 12px 0 6px; }
    .empty-state p  { font-size: 13px; color: var(--muted-foreground); }
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius);
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    #toast {
      position: fixed;
      bottom: 2rem; right: 2rem;
      padding: 0.85rem 1.4rem;
      border-radius: 12px;
      font-size: 0.875rem;
      font-weight: 600;
      color: #fff;
      z-index: 9999;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }
    #toast.show   { opacity: 1; transform: translateY(0); }
    #toast.t-err  { background: var(--destructive); }
    #toast.t-info { background: var(--primary); }
  </style>
</head>
<body>
  <div id="toast"></div>
  <div class="shell">

    <!-- Header -->
    <header style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;">
      <div style="display:flex;align-items:center;gap:14px;">
        <div class="logo-mark">E</div>
        <div class="logo-text">Exam<span>Flow</span></div>
        <div class="badge">Student Portal</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span id="navName" style="font-size:13px;color:var(--muted-foreground);font-weight:600;"></span>
        <button onclick="handleLogout()"
          style="background:var(--surface);border:1px solid var(--border);
                 padding:6px 16px;border-radius:var(--radius);
                 font-family:var(--font-display);font-size:13px;font-weight:600;
                 cursor:pointer;transition:all .2s;"
          onmouseover="this.style.borderColor='#ef4444';this.style.color='#ef4444'"
          onmouseout="this.style.borderColor='var(--border)';this.style.color=''">
          Logout
        </button>
      </div>
    </header>

    <!-- Welcome -->
    <div class="welcome-banner">
      <div class="welcome-text" style="position:relative;z-index:1;">
        <h2 id="welcomeH">Welcome back! 👋</h2>
        <p>Here are all your assigned exams, sorted by date.</p>
      </div>
      <div class="welcome-chips" id="welcomeChips">
        <span class="welcome-chip" id="rollChip">…</span>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon" style="background:var(--primary-light);">📋</div>
        <div><h3 id="sTotal">—</h3><p>Total Exams</p></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#fffbeb;">⏳</div>
        <div><h3 id="sPending">—</h3><p>Pending</p></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:var(--success-light);">✅</div>
        <div><h3 id="sDone">—</h3><p>Completed</p></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:var(--destructive-light);">🔒</div>
        <div><h3 id="sExpired">—</h3><p>Expired</p></div>
      </div>
    </div>

    <!-- Timeline -->
    <div class="section-header">
      <span class="section-heading">📅 Exams by Date</span>
      <span class="count-chip" id="examChip">Loading…</span>
    </div>

    <div id="timeline" class="timeline">
      <div id="skel">
        <div style="height:72px;border-radius:calc(var(--radius)*2);margin-bottom:14px;" class="skeleton"></div>
        <div style="height:72px;border-radius:calc(var(--radius)*2);margin-bottom:14px;" class="skeleton"></div>
        <div style="height:72px;border-radius:calc(var(--radius)*2);" class="skeleton"></div>
      </div>
    </div>

  </div>

  <script>
    const BASE      = "http://localhost:8085/Online_Examination_System";
    const studentId = sessionStorage.getItem("studentId")   || "";
    const name      = sessionStorage.getItem("studentName") || "Student";
    const roll      = sessionStorage.getItem("rollNo")      || "";

    window.addEventListener("DOMContentLoaded", () => {
      if (!studentId) {
        document.getElementById("timeline").innerHTML = `
          <div style="text-align:center;padding:60px 20px;background:#fff;border:1px dashed #e2e8f0;border-radius:16px;">
            <div style="font-size:2rem;margin-bottom:12px;">🔒</div>
            <div style="font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;margin-bottom:8px;">Session Expired</div>
            <div style="font-size:13px;color:#64748b;margin-bottom:20px;">Please log in again to access your dashboard.</div>
            <a href="/" style="background:#6366f1;color:#fff;padding:10px 24px;border-radius:8px;text-decoration:none;font-weight:600;font-size:13px;">← Back to Login</a>
          </div>`;
        return;
      }

      document.getElementById("navName").textContent  = "👤 " + name;
      document.getElementById("welcomeH").textContent = "Welcome back, " + name + "! 👋";
      document.getElementById("rollChip").textContent = "🪪 " + roll;

      loadExams();
    });

    async function loadExams() {
      try {
        const res  = await fetch(`${BASE}/student/exams?studentId=${studentId}`, {
          credentials: "include"
        });
        const data = await res.json();
        document.getElementById("skel").remove();
        if (!data.success) { toast(data.message, "t-err"); renderEmpty(); return; }
        render(data.exams || []);
      } catch (e) {
        console.error(e);
        document.getElementById("skel").remove();
        toast("Cannot reach server.", "t-err");
        renderEmpty();
      }
    }

    function render(exams) {
      const tl = document.getElementById("timeline");
      const total   = exams.length;
      const done    = exams.filter(e => e.attempted).length;
      const expired = exams.filter(e => !e.attempted && isExp(e.deadline)).length;
      const pending = total - done - expired;

      document.getElementById("sTotal").textContent   = total;
      document.getElementById("sPending").textContent = pending;
      document.getElementById("sDone").textContent    = done;
      document.getElementById("sExpired").textContent = expired;
      document.getElementById("examChip").textContent = total + " exam" + (total!==1?"s":"");
      document.getElementById("welcomeChips").innerHTML =
        `<span class="welcome-chip">🪪 ${roll}</span>
         <span class="welcome-chip">📋 ${total} Exam${total!==1?"s":""}</span>
         <span class="welcome-chip">✅ ${done} Done</span>`;

      if (!total) { renderEmpty(); return; }

      // Sort by createdAt ascending
      exams.sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));

      // Group by date
      const groups = {};
      exams.forEach((e, i) => {
        const k = dateLabel(e.createdAt);
        if (!groups[k]) groups[k] = [];
        groups[k].push({...e, idx: i+1});
      });

      Object.entries(groups).forEach(([label, list]) => {
        const dh = document.createElement("div");
        dh.innerHTML = `<div class="date-label">📅 ${label}</div>`;
        tl.appendChild(dh);

        list.forEach(exam => {
          const expired  = !exam.attempted && isExp(exam.deadline);
          const cls      = exam.attempted ? "attempted" : expired ? "expired" : "";
          const row      = document.createElement("div");
          row.className  = "exam-row " + cls;
          row.innerHTML  = `
            <div class="exam-num">${exam.attempted ? "✓" : exam.idx}</div>
            <div class="exam-info">
              <div class="exam-title">${exam.title}</div>
              <div class="exam-meta-chips">
                <span class="meta-chip">⏱️ ${exam.durationMinutes} mins</span>
                <span class="meta-chip">📊 ${exam.totalMarks} marks</span>
                <span class="meta-chip">🗓️ ${shortDate(exam.createdAt)}</span>
              </div>
            </div>
            ${deadlineBadge(exam.deadline, exam.attempted, expired)}
            ${actionBtn(exam, expired)}
          `;
          tl.appendChild(row);
        });
      });
    }

    function deadlineBadge(dl, attempted, expired) {
      if (attempted) return `<div class="deadline-badge dl-ok">✅ Completed</div>`;
      if (!dl)       return `<div class="deadline-badge dl-none">📅 No deadline</div>`;
      if (expired)   return `<div class="deadline-badge dl-expired">⛔ Expired: ${shortDate(dl)}</div>`;
      const hrs = (new Date(dl.replace(" ","T")) - new Date()) / 3600000;
      const cls = hrs < 24 ? "dl-warning" : "dl-ok";
      const pre = hrs < 24 ? "⚠️ Due soon:" : "📅 Due:";
      return `<div class="deadline-badge ${cls}">${pre} ${shortDate(dl)}</div>`;
    }

    function actionBtn(exam, expired) {
      const examUrl = "/student-exam.html?examId=" + exam.id;
      if (exam.attempted) return `<span class="btn-done">✅ Completed</span>`;
      if (expired)        return `<span class="btn-locked">🔒 Locked</span>`;
      return `<a href="${examUrl}" class="btn-start">Start Exam →</a>`;
    }

    function renderEmpty() {
      document.getElementById("timeline").innerHTML = `
        <div class="empty-state">
          <div style="font-size:2.5rem;">📭</div>
          <h3>No exams assigned yet</h3>
          <p>Your admin hasn't assigned any exams to you.<br/>Check back later!</p>
        </div>`;
      ["sTotal","sPending","sDone","sExpired"].forEach(id =>
        document.getElementById(id).textContent = "0");
      document.getElementById("examChip").textContent = "0 exams";
    }

    function isExp(dl) {
      if (!dl) return false;
      return new Date(dl.replace(" ","T")) < new Date();
    }
    function dateLabel(ds) {
      if (!ds) return "Unknown Date";
      const d = new Date(ds.replace(" ","T"));
      const t = new Date(), y = new Date(t); y.setDate(t.getDate()-1);
      if (d.toDateString()===t.toDateString()) return "Today";
      if (d.toDateString()===y.toDateString()) return "Yesterday";
      return d.toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
    }
    function shortDate(ds) {
      if (!ds) return "";
      return new Date(ds.replace(" ","T"))
        .toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"});
    }
    function toast(msg, type="t-info") {
      const t = document.getElementById("toast");
      t.textContent = msg; t.className = "show "+type;
      clearTimeout(t._t); t._t = setTimeout(()=>t.className="", 3500);
    }
    function handleLogout() {
      sessionStorage.clear();
      fetch(`${BASE}/logout`,{credentials:"include"}).catch(()=>{});
      window.location.href = "/";
    }
  </script>
</body>
</html>
