<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Students — ExamFlow Admin</title>
  <link rel="stylesheet" href="css/admin-style.css"/>
  <style>
    /* ── Search bar ── */
    .search-wrap {
      position: relative;
      margin-bottom: 20px;
    }
    .search-wrap input {
      width: 100%;
      padding: 11px 44px 11px 16px;
      border: 1.5px solid var(--border);
      border-radius: calc(var(--radius) * 2);
      font-size: 14px;
      font-family: var(--font-body);
      background: var(--card);
      color: var(--foreground);
      outline: none;
      box-shadow: var(--shadow-xs);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-wrap input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }
    .search-icon {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted-foreground);
      font-size: 16px;
      pointer-events: none;
    }

    /* ── Stats ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 2);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow-xs);
    }
    .stat-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    .stat-card h3 {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1;
    }
    .stat-card p { font-size: 12px; color: var(--muted-foreground); margin-top: 2px; font-weight: 600; }

    /* ── Students table ── */
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 2);
      overflow: hidden;
      box-shadow: var(--shadow-xs);
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--surface); }
    th {
      padding: 12px 16px;
      text-align: left;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted-foreground);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: 14px 16px;
      font-size: 13px;
      color: var(--foreground);
      border-bottom: 1px solid var(--surface);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface); cursor: pointer; }

    /* ── Avatar circle ── */
    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .student-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .student-name {
      font-weight: 700;
      font-family: var(--font-display);
      font-size: 13px;
    }
    .student-email { font-size: 11px; color: var(--muted-foreground); margin-top: 1px; }

    /* ── Exam count chip ── */
    .exam-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--primary-light);
      color: var(--primary-dark);
      border: 1px solid #c7d2fe;
      border-radius: 999px;
      padding: 2px 10px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
    }

    /* ── Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(15,23,42,0.55);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 3);
      padding: 32px;
      max-width: 520px;
      width: 92%;
      box-shadow: var(--shadow-lg);
      animation: popIn 0.2s ease;
      max-height: 85vh;
      overflow-y: auto;
    }
    @keyframes popIn {
      from { transform: scale(0.95); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .modal-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 700;
    }
    .modal-sub { font-size: 12px; color: var(--muted-foreground); margin-top: 2px; }
    .close-btn {
      margin-left: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      width: 32px; height: 32px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .close-btn:hover { background: var(--destructive-light); border-color: #fca5a5; }

    /* ── Detail rows ── */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .detail-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
    }
    .detail-label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted-foreground);
      margin-bottom: 3px;
    }
    .detail-val {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      color: var(--foreground);
    }

    /* ── Exam list in modal ── */
    .exam-section-title {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted-foreground);
      margin-bottom: 10px;
    }
    .exam-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      margin-bottom: 8px;
      gap: 10px;
    }
    .exam-item-title {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      flex: 1;
    }
    .exam-item-meta { font-size: 11px; color: var(--muted-foreground); margin-top: 2px; }
    .badge-done    { background: var(--success-light); color: #065f46; border: 1px solid #6ee7b7; border-radius: 999px; padding: 2px 10px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .badge-pending { background: var(--primary-light); color: var(--primary-dark); border: 1px solid #c7d2fe; border-radius: 999px; padding: 2px 10px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .badge-expired { background: var(--destructive-light); color: #991b1b; border: 1px solid #fca5a5; border-radius: 999px; padding: 2px 10px; font-size: 11px; font-weight: 700; white-space: nowrap; }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius);
      height: 52px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 2rem; right: 2rem;
      padding: 0.85rem 1.4rem; border-radius: 12px;
      font-size: 0.875rem; font-weight: 600; color: #fff;
      z-index: 9999; opacity: 0; transform: translateY(10px);
      transition: opacity 0.3s, transform 0.3s; pointer-events: none;
    }
    #toast.show   { opacity: 1; transform: translateY(0); }
    #toast.t-err  { background: var(--destructive); }
    #toast.t-info { background: var(--primary); }

    /* ── Empty ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted-foreground);
    }
    .empty .icon { font-size: 2.5rem; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div id="toast"></div>

  <!-- Student detail modal -->
  <div class="modal-backdrop" id="studentModal">
    <div class="modal-box">
      <div class="modal-header">
        <div class="avatar" id="modalAvatar">?</div>
        <div>
          <div class="modal-title" id="modalName">Loading…</div>
          <div class="modal-sub"  id="modalRoll"></div>
        </div>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="detail-grid" id="modalDetails"></div>
      <div class="exam-section-title">📋 Enrolled Exams</div>
      <div id="modalExams"></div>
    </div>
  </div>

  <div class="shell">

    <!-- Header -->
    <header style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;">
      <div style="display:flex;align-items:center;gap:14px;">
        <div class="logo-mark">E</div>
        <div class="logo-text">Exam<span>Flow</span></div>
        <div class="badge">Admin Panel</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <a href="admin-panel.html"
           style="background:var(--surface);border:1px solid var(--border);
                  padding:6px 14px;border-radius:var(--radius);
                  font-family:var(--font-display);font-size:13px;font-weight:600;
                  text-decoration:none;color:var(--foreground);transition:all .2s;"
           onmouseover="this.style.borderColor='var(--primary)';this.style.color='var(--primary)'"
           onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--foreground)'">
          ← Exam Panel
        </a>
        <span id="navAdminName"
              style="font-size:12px;font-family:var(--font-mono);color:var(--muted-foreground);"></span>
        <button onclick="handleLogout()"
          style="background:var(--destructive-light);border:1px solid #fca5a5;
                 padding:6px 14px;border-radius:var(--radius);
                 font-family:var(--font-display);font-size:12px;font-weight:600;
                 color:var(--destructive);cursor:pointer;">
          Logout
        </button>
      </div>
    </header>

    <!-- Page title -->
    <div style="margin-bottom:24px;">
      <div style="font-family:var(--font-display);font-size:24px;font-weight:700;
                  letter-spacing:-0.3px;margin-bottom:4px;">
        Student Management
      </div>
      <div style="font-size:13px;color:var(--muted-foreground);">
        View all registered students and their exam enrollments.
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon" style="background:var(--primary-light);">👥</div>
        <div><h3 id="sTotal">—</h3><p>Total Students</p></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:var(--success-light);">📋</div>
        <div><h3 id="sEnrolled">—</h3><p>With Exams</p></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#fffbeb;">🏫</div>
        <div><h3 id="sColleges">—</h3><p>Colleges</p></div>
      </div>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <input type="text" id="searchInput"
             placeholder="🔍  Search by name, roll number or email…"
             oninput="handleSearch(this.value)"/>
    </div>

    <!-- Section header -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <span style="font-family:var(--font-display);font-size:15px;font-weight:700;">
        All Students
      </span>
      <span class="count-chip" id="countChip">Loading…</span>
    </div>

    <!-- Table -->
    <div class="table-wrap" id="tableWrap">
      <div style="padding:20px;display:flex;flex-direction:column;gap:10px;" id="skeletonWrap">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </div>

  </div>

  <script>
    const BASE      = "http://localhost:8085/Online_Examination_System";
    const adminName = sessionStorage.getItem("adminName") || "Admin";
    let   allStudents = [];
    let   searchTimer = null;

    window.addEventListener("DOMContentLoaded", () => {
      if (!sessionStorage.getItem("adminId")) {
        window.location.href = "/";
        return;
      }
      document.getElementById("navAdminName").textContent = "👤 " + adminName;
      loadStudents();
    });

    // ── Load all students ──────────────────────────────────────────────────
    async function loadStudents(query = "") {
      try {
        const url  = query
          ? `${BASE}/admin/students?q=${encodeURIComponent(query)}`
          : `${BASE}/admin/students`;
        const res  = await fetch(url, { credentials: "include" });
        const data = await res.json();

        if (!data.success) { toast(data.message, "t-err"); return; }

        allStudents = data.students || [];
        renderTable(allStudents);
        updateStats(allStudents);

      } catch (e) {
        console.error(e);
        toast("Cannot reach server.", "t-err");
        document.getElementById("skeletonWrap")?.remove();
        renderEmpty("Cannot connect to server.");
      }
    }

    // ── Render table ───────────────────────────────────────────────────────
    function renderTable(students) {
      const wrap = document.getElementById("tableWrap");
      document.getElementById("skeletonWrap")?.remove();
      document.getElementById("countChip").textContent =
        students.length + " student" + (students.length !== 1 ? "s" : "");

      if (!students.length) {
        wrap.innerHTML = `
          <div class="empty">
            <div class="icon">👥</div>
            <div style="font-family:var(--font-display);font-size:15px;font-weight:700;margin-bottom:6px;">
              No students found
            </div>
            <div style="font-size:13px;">
              ${document.getElementById("searchInput").value
                ? "No students match your search."
                : "No students registered yet."}
            </div>
          </div>`;
        return;
      }

      wrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Student</th>
              <th>Roll Number</th>
              <th>College</th>
              <th>Class</th>
              <th>Exams</th>
              <th>Joined</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>`;

      const tbody = document.getElementById("tbody");
      students.forEach((s, i) => {
        const tr = document.createElement("tr");
        tr.onclick = () => openModal(s.id);
        tr.innerHTML = `
          <td style="color:var(--muted-foreground);font-family:var(--font-mono);font-size:11px;">
            ${i + 1}
          </td>
          <td>
            <div class="student-cell">
              <div class="avatar">${s.fullName.charAt(0).toUpperCase()}</div>
              <div>
                <div class="student-name">${s.fullName}</div>
                <div class="student-email">${s.email}</div>
              </div>
            </div>
          </td>
          <td>
            <span style="font-family:var(--font-mono);font-size:12px;
                         background:var(--surface);border:1px solid var(--border);
                         padding:3px 10px;border-radius:999px;">
              ${s.rollNo}
            </span>
          </td>
          <td style="font-size:12px;color:var(--muted-foreground);">${s.collegeName}</td>
          <td>
            <span class="count-chip">${s.classLevel}${s.stream ? " · " + s.stream : ""}</span>
          </td>
          <td>
            <span class="exam-chip">📋 ${s.examCount || 0}</span>
          </td>
          <td style="font-size:11px;color:var(--muted-foreground);font-family:var(--font-mono);">
            ${shortDate(s.createdAt)}
          </td>`;
        tbody.appendChild(tr);
      });
    }

    // ── Update stats ───────────────────────────────────────────────────────
    function updateStats(students) {
      document.getElementById("sTotal").textContent = students.length;
      const withExams = students.filter(s => (s.examCount || 0) > 0).length;
      document.getElementById("sEnrolled").textContent = withExams;
      const colleges = new Set(students.map(s => s.collegeName)).size;
      document.getElementById("sColleges").textContent = colleges;
    }

    // ── Search handler ─────────────────────────────────────────────────────
    function handleSearch(val) {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => loadStudents(val), 350);
    }

    // ── Open student modal ─────────────────────────────────────────────────
    async function openModal(studentId) {
      document.getElementById("modalName").textContent   = "Loading…";
      document.getElementById("modalRoll").textContent   = "";
      document.getElementById("modalDetails").innerHTML  = "";
      document.getElementById("modalExams").innerHTML    =
        '<div style="color:var(--muted-foreground);font-size:13px;">Loading…</div>';
      document.getElementById("studentModal").classList.add("open");

      try {
        const res  = await fetch(`${BASE}/admin/students?id=${studentId}`, {
          credentials: "include"
        });
        const data = await res.json();
        if (!data.success) { toast(data.message, "t-err"); return; }

        const s = data.student;
        document.getElementById("modalAvatar").textContent = s.fullName.charAt(0).toUpperCase();
        document.getElementById("modalName").textContent   = s.fullName;
        document.getElementById("modalRoll").textContent   = "🪪 " + s.rollNo;

        document.getElementById("modalDetails").innerHTML = `
          <div class="detail-item">
            <div class="detail-label">Email</div>
            <div class="detail-val">${s.email}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">College</div>
            <div class="detail-val">${s.collegeName}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Class / Year</div>
            <div class="detail-val">${s.classLevel}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Stream</div>
            <div class="detail-val">${s.stream || "—"}</div>
          </div>
          ${s.course ? `
          <div class="detail-item" style="grid-column:1/-1;">
            <div class="detail-label">Course</div>
            <div class="detail-val">${s.course}</div>
          </div>` : ""}
          <div class="detail-item">
            <div class="detail-label">Joined</div>
            <div class="detail-val">${shortDate(s.createdAt)}</div>
          </div>
        `;

        const exams    = s.exams || [];
        const examHtml = exams.length === 0
          ? '<div style="color:var(--muted-foreground);font-size:13px;padding:12px 0;">Not enrolled in any exam yet.</div>'
          : exams.map(e => {
              const expired  = e.deadline && new Date(e.deadline.replace(" ","T")) < new Date();
              const badgeCls = e.attempted ? "badge-done" : expired ? "badge-expired" : "badge-pending";
              const badgeTxt = e.attempted ? "✅ Done" : expired ? "⛔ Expired" : "⏳ Pending";
              return `
                <div class="exam-item">
                  <div>
                    <div class="exam-item-title">${e.title}</div>
                    <div class="exam-item-meta">
                      ⏱️ ${e.durationMinutes} mins &nbsp;·&nbsp;
                      📊 ${e.totalMarks} marks
                      ${e.deadline ? " &nbsp;·&nbsp; 📅 " + shortDate(e.deadline) : ""}
                    </div>
                  </div>
                  <span class="${badgeCls}">${badgeTxt}</span>
                </div>`;
            }).join("");

        document.getElementById("modalExams").innerHTML = examHtml;

      } catch (e) {
        console.error(e);
        toast("Failed to load student details.", "t-err");
      }
    }

    function closeModal() {
      document.getElementById("studentModal").classList.remove("open");
    }

    // Click outside modal to close
    document.getElementById("studentModal").addEventListener("click", (e) => {
      if (e.target === document.getElementById("studentModal")) closeModal();
    });

    // ── Helpers ────────────────────────────────────────────────────────────
    function renderEmpty(msg) {
      document.getElementById("tableWrap").innerHTML = `
        <div class="empty">
          <div class="icon">⚠️</div>
          <div style="font-size:13px;">${msg}</div>
        </div>`;
    }

    function shortDate(ds) {
      if (!ds) return "—";
      try {
        return new Date(ds.replace(" ","T"))
          .toLocaleDateString("en-IN", { day:"numeric", month:"short", year:"numeric" });
      } catch { return ds; }
    }

    function toast(msg, type = "t-info") {
      const t = document.getElementById("toast");
      t.textContent = msg; t.className = "show " + type;
      clearTimeout(t._t); t._t = setTimeout(() => t.className = "", 3500);
    }

    function handleLogout() {
      sessionStorage.clear();
      fetch(`${BASE}/logout`, { credentials: "include" }).catch(() => {});
      window.location.href = "/";
    }
  </script>
</body>
</html>
